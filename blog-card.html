<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Card</title>
    <link rel="stylesheet" href="blog-preview.css">
</head>
<body>
    <section>
        <div class="card">
            <div class="thumbnail">
                <img src="thumbnail.png" alt="logo">
            </div>
            <div class="label">
                <label for="text">Learning</label>
                <p>published 21 Dec 2023</p>

            </div>
            <div class="article">
                <h2>HTML & CSS foundations</h2>
                <p>These languages are the backbone of every website, defining
                   structure, content, and presentation.
                </p>
            </div>
            <footer class="avatar">
               <button><img src="avatar.jpg" alt="avatar"></button> 
                <h3>Abel Angkyier</h3>
            </footer>
        </div>
    </section>
</body>
</html>
